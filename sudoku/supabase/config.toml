# Supabase project config
# Generated by `supabase init`
project_id = "sudoku-daily"

[api]
enabled = true
port = 54321
schemas = ["public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://localhost:5173"
additional_redirect_urls = ["https://sudokudaily.app", "https://staging.sudokudaily.app"]
jwt_expiry = 3600
enable_signup = true
enable_anonymous_sign_ins = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false   # set true in prod

[auth.external.google]
enabled = false
# client_id = ""
# secret = ""

[edge_runtime]
enabled = true
inspector_port = 8083
